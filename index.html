<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 在模块 JS 加载前将 www 跳到主域 chipgo.net，避免跨子域导致登录 Cookie 无法随请求发送 -->
    <script>
      (function () {
        if (location.hostname !== 'www.chipgo.net') return;
        location.replace(
          location.protocol +
            '//chipgo.net' +
            location.pathname +
            location.search +
            location.hash
        );
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能助手</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-screen" role="dialog" aria-labelledby="loginTitle">
      <div class="login-card">
        <h1 id="loginTitle" class="brand">智能助手</h1>
        <p class="login-subtitle">请登录后使用</p>
        <form id="loginForm" class="login-form" novalidate>
          <label class="login-field">
            <span class="login-label">账号</span>
            <input
              type="text"
              id="loginUser"
              name="username"
              class="login-input"
              autocomplete="username"
              required
            />
          </label>
          <label class="login-field">
            <span class="login-label">密码</span>
            <div class="login-password-wrap">
              <input
                type="password"
                id="loginPass"
                name="password"
                class="login-input login-input--password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                id="loginPassToggle"
                class="login-password-toggle"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <span class="login-password-toggle-icon" data-when="hidden" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </span>
                <span class="login-password-toggle-icon" data-when="visible" aria-hidden="true" hidden>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                    <line x1="2" y1="2" x2="22" y2="22"/>
                  </svg>
                </span>
              </button>
            </div>
          </label>
          <p id="loginError" class="login-error" role="alert" hidden></p>
          <button type="submit" class="login-btn">登录</button>
        </form>
      </div>
    </div>

    <div class="app" id="app" hidden>
      <aside class="sidebar" aria-label="功能选择">
        <div class="sidebar-account">
          <button
            type="button"
            id="userAvatarBtn"
            class="user-avatar-btn"
            aria-label="账户菜单"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span class="user-avatar-icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
          </button>
          <div id="userMenu" class="user-menu" role="menu" hidden>
            <div id="userMenuUsername" class="user-menu-username" role="presentation" hidden></div>
            <button type="button" id="logoutBtn" class="user-menu-item" role="menuitem">
              退出登录
            </button>
          </div>
        </div>
        <header class="sidebar-header">
          <h1 class="brand">智能助手</h1>
          <p class="tagline">Powered by OpenClaw</p>
        </header>
        <nav class="agent-nav" id="agentNav" role="tablist"></nav>
        <footer class="sidebar-footer" id="openclawStatus">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text">正在连接 OpenClaw…</span>
        </footer>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="chat-header-text">
            <h2 id="agentTitle">—</h2>
            <p id="agentDesc">选择左侧功能开始对话</p>
          </div>
        </header>

        <div class="messages" id="messages" role="log" aria-live="polite"></div>

        <footer class="composer">
          <div class="composer-inner">
            <input
              type="file"
              id="fileInput"
              class="file-input"
              multiple
              hidden
            />
            <button
              type="button"
              class="icon-btn"
              id="attachBtn"
              title="上传文件"
              aria-label="上传文件"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <textarea
              id="messageInput"
              class="message-input"
              rows="1"
              placeholder="输入消息…"
              aria-label="消息输入"
            ></textarea>
            <button type="button" class="send-btn" id="sendBtn" disabled aria-label="发送">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3.4 20.4l17.2-8.6L3.4 3.2v7.2L14 12 3.4 13.2v7.2z"/>
              </svg>
            </button>
          </div>
          <p class="composer-hint" id="composerHint"></p>
        </footer>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
