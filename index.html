<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能助手</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-screen" role="dialog" aria-labelledby="loginTitle">
      <div class="login-card">
        <div class="logo" aria-hidden="true"></div>
        <h1 id="loginTitle" class="brand">智能助手</h1>
        <p class="login-subtitle">请登录后使用</p>
        <form id="loginForm" class="login-form" novalidate>
          <label class="login-field">
            <span class="login-label">账号</span>
            <input
              type="text"
              id="loginUser"
              name="username"
              class="login-input"
              autocomplete="username"
              required
            />
          </label>
          <label class="login-field">
            <span class="login-label">密码</span>
            <input
              type="password"
              id="loginPass"
              name="password"
              class="login-input"
              autocomplete="current-password"
              required
            />
          </label>
          <p id="loginError" class="login-error" role="alert" hidden></p>
          <button type="submit" class="login-btn">登录</button>
        </form>
      </div>
    </div>

    <div class="app" id="app" hidden>
      <aside class="sidebar" aria-label="功能选择">
        <div class="sidebar-account">
          <button
            type="button"
            id="userAvatarBtn"
            class="user-avatar-btn"
            aria-label="账户菜单"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <span class="user-avatar-icon" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
          </button>
          <div id="userMenu" class="user-menu" role="menu" hidden>
            <button type="button" id="logoutBtn" class="user-menu-item" role="menuitem">
              退出登录
            </button>
          </div>
        </div>
        <header class="sidebar-header">
          <div class="logo" aria-hidden="true"></div>
          <h1 class="brand">智能助手</h1>
          <p class="tagline">Powered by OpenClaw</p>
        </header>
        <nav class="agent-nav" id="agentNav" role="tablist"></nav>
        <footer class="sidebar-footer" id="openclawStatus">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text">正在连接 OpenClaw…</span>
        </footer>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="chat-header-text">
            <h2 id="agentTitle">—</h2>
            <p id="agentDesc">选择左侧功能开始对话</p>
          </div>
        </header>

        <div class="messages" id="messages" role="log" aria-live="polite"></div>

        <footer class="composer">
          <div class="composer-inner">
            <input
              type="file"
              id="fileInput"
              class="file-input"
              multiple
              hidden
            />
            <button
              type="button"
              class="icon-btn"
              id="attachBtn"
              title="上传文件"
              aria-label="上传文件"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <textarea
              id="messageInput"
              class="message-input"
              rows="1"
              placeholder="输入消息…"
              aria-label="消息输入"
            ></textarea>
            <button type="button" class="send-btn" id="sendBtn" disabled aria-label="发送">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3.4 20.4l17.2-8.6L3.4 3.2v7.2L14 12 3.4 13.2v7.2z"/>
              </svg>
            </button>
          </div>
          <p class="composer-hint" id="composerHint"></p>
        </footer>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
